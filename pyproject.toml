# artist-shuffle ships as a single standalone script (artist-shuffle.py) that
# depends only on the Python standard library. This file is not a package
# definition; it only configures the development tooling (ruff and pytest).

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "FBT", "C4", "SIM"]
